<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="480" height="480" viewBox="0 0 480 480">
  <!-- ShidaoSlicer logo: Chinese warrior bench-testing a dao (刀). -->
  <image x="120" y="20" width="240" height="240" preserveAspectRatio="xMidYMid meet"
         xlink:href="data:image/png;base64,"/>
  <!-- Wordmark: "ShidaoSlicer" centred. Sans-serif fallback chain. -->
  <text x="240" y="295" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="34" font-weight="600" letter-spacing="0.5"
        fill="#E8E8E8">ShidaoSlicer</text>
  <!-- Tagline: 试刀 (Chinese for "testing the blade") + roman gloss. -->
  <text x="240" y="325" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-style="italic" letter-spacing="0.3"
        fill="#A0A0A0">试刀 — testing the blade</text>
  <!-- Subtle subtitle pinned just under the tagline; sits above the C++-rendered
       version string (Decorate() draws at y=0.70*480=336). -->
</svg>
