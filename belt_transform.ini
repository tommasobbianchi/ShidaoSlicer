# Belt Transform for CR-30 Style Printer (IdeaFormer IR3 V2)
# Machine axes: X=lateral, Y=gantry(45° to belt surface), Z=belt(infinite)
#
# IMPORTANT: Forward and Inverse are NOT exact matrix inverses.
# They serve different purposes in the pipeline:
#   Forward: model placement → virtual slicing space (trafo_centered)
#   Inverse: virtual gcode coords → physical machine commands
# The √2 discrepancy on Y accounts for the gantry axis convention:
#   Model Y = perpendicular height above belt surface
#   Machine Y = gantry travel along 45° incline = perp_height / cos(45°) = perp_height × √2
#
[Forward]
# Forward Transform: Machine -> Virtual (for slicing / trafo_centered)
#
# Maps model coordinates (perpendicular height) to virtual slicing space.
# Note: model enters forward transform with Y = perpendicular height (identity build transform).
#
# Physical meaning:
#   Y_virt = Y_model * cos(45°) = Y_model/√2   (compressed belt-normal distance)
#   Z_virt = Y_model/√2 + Z_model               (oblique slicing height)
#
# Matrix form (Y and Z rows):
# | 1/√2  0 |   for Y_virt = (1/√2)*Y_model
# | 1/√2  1 |   for Z_virt = (1/√2)*Y_model + Z_model

f_yy = 0.70710678  # cos(45°): Y_virt = Y_model/√2 (belt-normal distance)
f_yz = 0.0         # Y_virt independent of Z (belt travel)
f_zy = 0.70710678  # Z_virt: contribution from Y_model (1/√2)
f_zz = 1.0         # Z_virt: contribution from Z_model (belt travel)
f_y_shift = 0.0    # Keep Y_virt close to 0 at first layer

[Inverse]
# Inverse Transform: Virtual -> Machine (for G-code output)
#
# Converts virtual gcode coordinates to physical machine coordinates.
# Y_mach = gantry travel along 45° incline (IdeaMaker convention).
#
# With compute_belt_inclined_z: Z_gcode = layer_z + Y_gcode * tan(45°)
# The inverse receives (Y_gcode, Z_gcode) and produces (Y_mach, Z_mach).
#
# i_yy = 1/cos²(45°) = 2  (NOT √2 = 1/cos(45°))
# This accounts for:
#   1. Forward compressed Y_gcode = Y_model/√2 (forward transform)
#   2. Y_mach = Y_model × √2 = gantry travel along 45° (machine convention)
#   Combined: Y_mach = 2 * Y_gcode = (Y_model/√2) * 2 = Y_model × √2
#
# Physical meaning (with compute_belt_inclined_z applied):
#   Y_mach = 2 * Y_gcode = Y_model × √2  (gantry travel along 45° incline)
#   Z_mach = -Y_gcode + Z_gcode = layer_z (belt = constant per layer)
#
# IdeaMaker reference pattern (verified):
#   Y_mach (gantry) VARIES within layer — traces cross-section, max ≈ model_height × √2
#   Z_mach (belt)   CONSTANT within layer — belt stationary during extrusion

i_y_shift = 0.0    # No Y shift needed
i_z_shift = 0.0    # No Z shift needed
z_mach_offset = 0.117  # Z offset: aligns first layer Z with IdeaMaker reference
y_mach_offset = 0.0    # Y offset applied to Y_mach (nozzle gap above belt)

# Z-shift applied in trafo_centered() AFTER belt forward transform
trafo_z_shift = 0.0

i_yy = 2.0          # 1/cos²(45°): Y_mach = 2 * Y_gcode = Y_model × √2 (gantry travel)
i_yz = 0.0          # 0: Y_mach independent of layer height
i_zy = -1.0         # -1: Z_mach = -Y_gcode + Z_gcode = layer_z (belt per layer)
i_zz = 1.0          # 1: Z_mach depends on layer Z (= layer_z after Y cancels)
