# Shear Matrix Approach for Belt Printer (CR-30 Style)
# Belt kinematics: Y_machine = belt axis, Z_machine = head axis (perpendicular to belt)
# Belt surface is at 45° to Z_machine axis
[Forward]
# Forward Transform: Machine → Virtual (for slicing)
# Maps the tilted belt surface to horizontal slicing planes
# Virtual coordinates (for slicer):
#   Y_virt = Z_mach  (swap: belt motion becomes vertical "Z" in slicer)
#   Z_virt = Y_mach + Z_mach * tan(45°)  (shear: creates inclined layers)
#
# Matrix form (Y and Z rows):
# | 0  1 |   for Y_virt = 0*Y_mach + 1*Z_mach
# | 1  1 |   for Z_virt = 1*Y_mach + 1*Z_mach (tan(45°)=1)

f_yy = 0.0         # Y_virt: contribution from Y_mach
f_yz = 1.0         # Y_virt: contribution from Z_mach (swap)
f_zy = 1.0         # Z_virt: contribution from Y_mach
f_zz = 1.0         # Z_virt: contribution from Z_mach (shear, tan(45°)=1)
f_y_shift = 0.0    # Keep Y_virt close to 0 at first layer for correct inverse transform

[Inverse]
# Inverse Transform: Virtual → Machine (for G-code)
# Maps horizontal slice coordinates back to belt machine coordinates
# Machine coordinates (for G-code):
#   Y_mach = Z_virt - Y_virt  (reverse shear)
#   Z_mach = Y_virt           (reverse swap)
#
# Matrix form:
# | -1   1 |   for Y_mach = -1*Y_virt + 1*Z_virt
# |  1   0 |   for Z_mach =  1*Y_virt + 0*Z_virt

i_y_shift = 0.0    # Match f_y_shift for correct inverse
i_z_shift = 0.0    # No Z adjustment needed
z_mach_offset = 2.5  # Z offset to ensure all head movements are positive
y_mach_offset = 0.5  # Y offset to ensure all belt movements are positive (reduced to match IdeaMaker)

# Z-shift applied in trafo_centered() AFTER belt transform
# Brings object from belt center (Y_mach=1000) down to Z_virt ≈ 0
# Tune so that Y_virt ≈ i_y_shift at first layer → gives Y_mach ≈ 0, Z_mach > 0
trafo_z_shift = -990.0
i_yy = -1.0        # Y_mach: contribution from Y_virt (negative because reverse shear)
i_yz = 1.0         # Y_mach: contribution from Z_virt
i_zy = 1.0         # Z_mach: contribution from Y_virt (reverse swap)
i_zz = 0.0         # Z_mach: contribution from Z_virt
