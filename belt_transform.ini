# Belt Transform for CR-30 Style Printer (IdeaFormer IR3 V2)
# Machine axes: X=lateral, Y=gantry(45° to belt surface), Z=belt(infinite)
#
# ============================================================================
# TRANSFORM COEFFICIENTS ARE LOCKED IN BeltTransform.cpp
# Physically validated: Benchy printed 2026-02-23 on IdeaFormer IR3 V2.
# The f_yy/f_zy/i_yy/i_zy/etc. values below are IGNORED — they exist
# only as documentation. To change them, edit the constexpr values in
# BeltTransform.cpp and do a physical test print.
# ============================================================================
#
# Forward and Inverse are NOT exact matrix inverses.
# They serve different purposes:
#   Forward: model placement → virtual slicing space (trafo_centered)
#   Inverse: virtual gcode coords → physical machine commands
# The √2 discrepancy on Y accounts for the gantry axis convention:
#   Model Y = perpendicular height above belt surface
#   Machine Y = gantry travel along 45° incline = perp_height × √2
#
[Forward]
# Forward Transform: Machine -> Virtual (for slicing / trafo_centered)
# LOCKED — these values are NOT read from this file.
#
#   Y_virt = Y_model × cos(45°) = Y_model/√2
#   Z_virt = Y_model/√2 + Z_model
#
# f_yy = 0.70710678  # cos(45°)
# f_yz = 0.0
# f_zy = 0.70710678  # cos(45°)
# f_zz = 1.0

[Inverse]
# Inverse Transform: Virtual -> Machine (for G-code output)
# LOCKED — these values are NOT read from this file.
#
#   Y_mach = 2 × Y_gcode = Y_model × √2   (gantry travel along 45° incline)
#   Z_mach = -Y_gcode + Z_gcode = layer_z  (belt = constant per layer)
#
# i_yy = 2.0          # 1/cos²(45°) — gantry travel
# i_yz = 0.0
# i_zy = -1.0
# i_zz = 1.0

[Offsets]
# These values ARE read from this file and can be tuned.
f_y_shift = 0.0
i_y_shift = 0.0
i_z_shift = 0.0
z_mach_offset = 0.117  # Z offset: aligns first layer Z with IdeaMaker reference
y_mach_offset = 0.0    # Y offset applied to Y_mach (nozzle gap above belt)
trafo_z_shift = 0.0    # Z-shift in trafo_centered() AFTER belt forward transform
