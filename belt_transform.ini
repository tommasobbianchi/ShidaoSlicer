# Shear Matrix Approach for Belt Printer (CR-30 Style)
# IdeaFormer IR3 V2: X=lateral, Y=gantry(45° to belt surface), Z=belt(infinite)
[Forward]
# Forward Transform: Machine -> Virtual (for slicing)
# Maps the tilted belt surface to horizontal slicing planes
# Virtual coordinates (for slicer):
#   Y_virt = Z_mach  (swap: belt motion becomes slicer Y)
#   Z_virt = Y_mach + Z_mach  (shear: creates oblique slicing planes at 45°)
#
# Matrix form (Y and Z rows):
# | 0  1 |   for Y_virt = 0*Y_mach + 1*Z_mach
# | 1  1 |   for Z_virt = 1*Y_mach + 1*Z_mach (tan(45°)=1)

f_yy = 0.0         # Y_virt: contribution from Y_mach
f_yz = 1.0         # Y_virt: contribution from Z_mach (swap)
f_zy = 1.0         # Z_virt: contribution from Y_mach
f_zz = 1.0         # Z_virt: contribution from Z_mach (shear, tan(45°)=1)
f_y_shift = 0.0    # Keep Y_virt close to 0 at first layer for correct inverse transform

[Inverse]
# Inverse Transform: Virtual -> Machine (for G-code output)
#
# With compute_belt_inclined_z, the Z input is: Z_input = m_nominal_z + Y_gcode * tan(45°)
# The inverse receives (Y_gcode, Z_input) and produces (Y_mach, Z_mach).
#
# IdeaMaker reference pattern:
#   Y_mach (gantry) VARIES within layer — traces cross-section above belt surface
#   Z_mach (belt)   CONSTANT within layer — belt stationary during extrusion
#
# Coefficients:
#   Y_mach = i_yy * Y_gcode + i_yz * Z_gcode
#          = sqrt(2) * Y_gcode                    (varies within layer)
#   Z_mach = i_zy * Y_gcode + i_zz * Z_gcode
#          = -Y_gcode + (m_nominal_z + Y_gcode)
#          = m_nominal_z                           (constant per layer)

i_y_shift = 0.0    # Match f_y_shift for correct inverse
i_z_shift = 0.0    # No Z adjustment needed
z_mach_offset = 0.117  # Z offset: aligns first layer Z with IdeaMaker reference (0.283+0.117=0.400)
y_mach_offset = 0.0  # Y offset applied to Y_mach (nozzle gap above belt)

# Z-shift applied in trafo_centered() AFTER belt forward transform
trafo_z_shift = 0.0

i_yy = 1.41421356   # sqrt(2): Y_mach = sqrt(2) * Y_gcode (gantry traces cross-section)
i_yz = 0.0           # 0: Y_mach independent of layer height
i_zy = -1.0          # -1: Z_mach = -Y_gcode + Z_gcode = m_nominal_z (belt per layer)
i_zz = 1.0           # 1: Z_mach depends on layer Z (=m_nominal_z after Y cancels)
