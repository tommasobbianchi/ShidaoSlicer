# Belt Transform for CR-30 Style Printer (IdeaFormer IR3 V2)
# Machine axes: X=lateral, Y=gantry(45° to belt surface), Z=belt(infinite)
#
# ============================================================================
# TRANSFORM COEFFICIENTS ARE LOCKED IN BeltTransform.cpp
# Restored 2026-02-24: correct 45° keel-first slicing (Y+Z=const planes)
# ============================================================================
#
# Forward: model → virtual slicing space
#   Y_virt = Z_model                       (belt direction → virtual Y)
#   Z_virt = Y_model + Z_model             (45° slicing: Y+Z = constant)
#
# Inverse: virtual gcode → machine coordinates (with inclined Z active)
#   Y_mach = √2 × Y_gcode                 (gantry traces cross-section)
#   Z_mach = -Y_gcode + Z_gcode = layer_z  (belt position, constant per layer)
#
# The inclined Z in GCode.cpp (Z_gcode = layer_z + Y*tan(45°)) cancels the
# i_zy=-1 coupling, making Z_mach = layer_z (constant per layer).
#
[Forward]
# LOCKED — these values are NOT read from this file.
# f_yy = 0.0
# f_yz = 1.0
# f_zy = 1.0
# f_zz = 1.0

[Inverse]
# LOCKED — these values are NOT read from this file.
# i_yy = 1.41421356   (√2)
# i_yz = 0.0
# i_zy = -1.0
# i_zz = 1.0

[Offsets]
# These values ARE read from this file and can be tuned.
f_y_shift = 0.0
i_y_shift = 0.0
i_z_shift = 0.0
z_mach_offset = 0.117  # Z offset: aligns first layer Z with IdeaMaker reference
y_mach_offset = 0.0    # Y offset applied to Y_mach (nozzle gap above belt)
trafo_z_shift = 0.0    # Z-shift in trafo_centered() AFTER belt forward transform
