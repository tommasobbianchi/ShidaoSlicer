# Shear Matrix Approach for Belt Printer (CR-30 Style)
# IdeaFormer IR3 V2: X=lateral, Y=gantry(45° to belt surface), Z=belt(infinite)
[Forward]
# Forward Transform: Machine → Virtual (for slicing)
# Maps the tilted belt surface to horizontal slicing planes
# Virtual coordinates (for slicer):
#   Y_virt = Z_mach  (swap: belt motion becomes slicer Y)
#   Z_virt = Y_mach + Z_mach  (shear: creates oblique slicing planes at 45°)
#
# Matrix form (Y and Z rows):
# | 0  1 |   for Y_virt = 0*Y_mach + 1*Z_mach
# | 1  1 |   for Z_virt = 1*Y_mach + 1*Z_mach (tan(45°)=1)

f_yy = 0.0         # Y_virt: contribution from Y_mach
f_yz = 1.0         # Y_virt: contribution from Z_mach (swap)
f_zy = 1.0         # Z_virt: contribution from Y_mach
f_zz = 1.0         # Z_virt: contribution from Z_mach (shear, tan(45°)=1)
f_y_shift = 0.0    # Keep Y_virt close to 0 at first layer for correct inverse transform

[Inverse]
# Inverse Transform: Virtual → Machine (for G-code output)
#
# With compute_belt_inclined_z, the Z input is: Z_input = m_nominal_z + Y_gcode
# The inverse receives (Y_gcode, Z_input) and produces (Y_mach, Z_mach).
#
# Y_mach = (i_yy + i_yz) * Y_gcode + i_yz * m_nominal_z + y_mach_offset
# Z_mach = (i_zy + i_zz) * Y_gcode + i_zz * m_nominal_z + z_mach_offset
#
# Design goals for belt printer G-code:
#   Y_mach (gantry) varies WITHIN layer to trace cross-section, stays near belt surface
#   Z_mach (belt) constant WITHIN layer, advances BETWEEN layers
#
# For Y_mach ∝ Y_gcode only: i_yz = 0 (no m_nominal_z dependency)
# For correct 45° gantry scaling: i_yy = √2
#   → Y_mach = √2 × Y_gcode (belt-normal height × gantry scaling)
#
# For Z_mach constant per layer: (i_zy + i_zz) = 0
# For Z_mach = m_nominal_z: i_zz = 1, i_zy = -1
#   → Z_mach = m_nominal_z (belt position = layer's Z_virt)
#
# Matrix form:
# | √2   0 |   for Y_mach = √2*Y_gcode (gantry ∝ belt-normal, varies within layer)
# | -1   1 |   for Z_mach = m_nominal_z (belt advances per layer, constant within layer)
#
# Comparison with IdeaMaker for 1×20×1mm box at 45°:
#   Y_mach: stays [0, √2] mm (near belt surface) ← matches IdeaMaker
#   Z_mach: advances 0.2mm per layer from ~0.4 to ~20.8 ← matches IdeaMaker

i_y_shift = 0.0    # Match f_y_shift for correct inverse
i_z_shift = 0.0    # No Z adjustment needed
z_mach_offset = 0.0  # Z offset: 0 → Z_mach = m_nominal_z directly
y_mach_offset = 0.0  # Y offset: 0 → Y_mach = √2 × Y_gcode

# Z-shift applied in trafo_centered() AFTER belt forward transform
# With best_object_pos=(0.5,0), objects are arranged near Y=0, so Z_virt is already small
trafo_z_shift = 0.0

# OLD VALUES (shear-inverse approach — Y_mach grew with layer number):
# i_yy = -1.41421356  # -√2
# i_yz = 1.41421356   #  √2  → Y_mach = √2 × m_nominal_z (WRONG: gantry goes to 29mm)
# i_zy = 1.0          # Z_mach = Y_gcode (belt barely moved)
# i_zz = 0.0
# z_mach_offset = 0.15
# y_mach_offset = 0.0

i_yy = 1.41421356   #  √2: Y_mach = √2 × Y_gcode (gantry traces cross-section)
i_yz = 0.0          #  0:  Y_mach independent of layer number
i_zy = -1.0         # -1:  cancels Y_gcode in Z_mach
i_zz = 1.0          #  1:  Z_mach = m_nominal_z (belt advances per layer)
