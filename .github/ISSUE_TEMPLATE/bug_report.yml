name: 🐛 Bug report
description: A belt-printer slice misbehaves, a crash, a gate failure.
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Most belt bugs need:
        **gcode + gate output + printer model**. Please don't omit those.

  - type: checkboxes
    attributes:
      label: Existing issue check
      description: Please search existing issues before filing.
      options:
        - label: I searched both open and closed issues and didn't find a duplicate.
          required: true

  - type: input
    id: printer
    attributes:
      label: Printer model
      description: "Belt printer this happened on. E.g. IdeaFormer IR3 V2, CR-30, custom 45° belt."
      placeholder: "IdeaFormer IR3 V2"
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: ShidaoSlicer commit hash
      description: "Output of `git rev-parse HEAD` in the repo you built from. Or the AppImage filename if you used a release build."
      placeholder: "f613915029"
    validations:
      required: true

  - type: dropdown
    id: where
    attributes:
      label: Where does the bug manifest?
      multiple: false
      options:
        - GUI (Prepare tab — model loading / placement)
        - GUI (Preview tab — slider / toolpath rendering)
        - Slicer (gcode generation fails or produces wrong output)
        - Gate (validation/belt_gcode_gate.py reports BLOCKED / unexpected WARN)
        - Hardware (slicer says OK, printer behaves wrong)
        - Build (won't compile or AppImage broken)
        - Other
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: "Numbered steps from a fresh launch. Attach the 3MF/STL if possible (drag-drop into this issue)."
      placeholder: |
        1. Open Orca
        2. Load attached `mymodel.3mf`
        3. Select preset IdeaFormer IR3 V2 0.4 nozzle
        4. Click Slice
        5. Observe: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: gate
    attributes:
      label: belt_gcode_gate.py output
      description: "If the bug is gcode-related, attach the full `python3 validation/belt_gcode_gate.py file.gcode` output. R7 / R11 failures are especially relevant."
      render: shell

  - type: textarea
    id: log
    attributes:
      label: Debug log
      description: "If the bug is a crash or GUI misbehavior, attach the last ~100 lines of `~/.config/OrcaBelt/log/debug_*_<PID>.log.0`. If it's a crash, also attach `/tmp/orcabelt_crash_<PID>.log`."
      render: shell

  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        OS: Ubuntu 24.04
        GPU: NVIDIA RTX 4070 Ti SUPER / Intel iGPU / etc.
        Built from source / AppImage / packaged?
    validations:
      required: true
