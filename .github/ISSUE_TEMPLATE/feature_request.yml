name: 🚀 Feature request / enhancement
description: Suggest an improvement specific to the belt-printer workflow.
title: "[feat] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ShidaoSlicer focuses on belt printers. **General OrcaSlicer features
        should be filed upstream at https://github.com/SoftFever/OrcaSlicer
        instead.** This template is for belt-specific functionality.

  - type: textarea
    id: hardware
    attributes:
      label: Hardware scenario
      description: "What machine / filament / geometry combination does this feature help with?"
      placeholder: "IdeaFormer IR3 V2 + PETG bridges over 50 mm — current overhang detection over-supports cantilevers in print-forward shadow."
    validations:
      required: true

  - type: textarea
    id: ux
    attributes:
      label: Proposed UX
      description: "How would the user interact with this? (toggle in print settings, CLI flag of support_preprocess.py, automatic when condition X, …)"
    validations:
      required: true

  - type: textarea
    id: blocked
    attributes:
      label: What's currently blocking
      description: "What workaround do you use today? What's painful about it?"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Other ways this could be solved, and why you think your proposal is better. Skip if not applicable."
