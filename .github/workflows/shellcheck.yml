on:
  push:
    paths:
      - 'scripts/linux.d/**'
      - 'build_linux.sh'
      - 'build_release_macos.sh'
  pull_request:
    paths:
      - 'scripts/linux.d/**'
      - 'build_linux.sh'
      - 'build_release_macos.sh'
  schedule:
      - cron: '55 7 * * *' # run once a day near midnight US Pacific time
  workflow_dispatch: # allows for manual dispatch

name: "Shellcheck"
permissions: {}

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Cache shellcheck download
        id: cache-shellcheck-v0_11
        uses: actions/cache@v5
        with:
          path: ~/shellcheck
          key: ${{ runner.os }}-shellcheck-v0_11

      - name: Download shellcheck
        if: steps.cache-shellcheck-v0_11.outputs.cache-hit != 'true'
        shell: bash
        env:
          INPUT_VERSION: "v0.11.0"
        run: |
          curl -L#o ~/sc.tar.xz "https://github.com/koalaman/shellcheck/releases/download/${INPUT_VERSION}/shellcheck-${INPUT_VERSION}.linux.x86_64.tar.xz"
          tar -xvf ~/sc.tar.xz -C ~
          mv ~/shellcheck-"${INPUT_VERSION}"/shellcheck ~/shellcheck

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Shellcheck scripts
        # ShidaoSlicer: only lint the scripts that ship with the slicer
        # (distro packaging under scripts/linux.d/ and the two top-level
        # build entrypoints). Developer / belt-validation helpers under
        # scripts/*.sh, validation/*.sh, set_resolution.sh, etc. are
        # intentionally out of scope — they're not distributed and live
        # outside of the slicer's release path.
        run: |
          set -e
          # --severity=error: surface only real bugs (parse errors, broken
          # quoting, etc.) — stylistic warnings (SC2034, SC2086) on these
          # upstream-inherited scripts shouldn't gate CI.
          ~/shellcheck --severity=error build_linux.sh build_release_macos.sh
          find scripts/linux.d -type f \( -name '*.sh' -o ! -name '*.md' \) -print0 \
            | xargs -0 ~/shellcheck --severity=error
